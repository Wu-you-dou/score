<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生会积分考勤系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f4f7fa;padding:15px}
        .container{max-width:100%;background:white;padding:15px;border-radius:12px}
        h2{text-align:center;margin-bottom:15px}
        .box{background:#f0f4f8;padding:12px;border-radius:8px;margin-bottom:15px}
        input{padding:8px;margin:4px;width:90%;border:1px solid #ddd;border-radius:6px}
        button{padding:8px 12px;background:#2F4056;color:white;border:none;border-radius:6px;margin:4px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:8px;text-align:center}
        th{background:#2F4056;color:white}
        .low{color:red;background:#ffeef0}
        .admin{display:none;background:#eef6ff}
        .record{margin-top:20px}
        .item{padding:6px;border-bottom:1px solid #eee;font-size:14px}
    </style>
</head>
<body>

<div class="container">
    <h2>学生会积分考勤系统</h2>

    <div class="box">
        预警分数：<span id="warn">60</span> 分
        <button onclick="login()">管理员登录</button>
    </div>

    <div class="box admin" id="admin">
        部门：<input id="dept" placeholder="部门"><br>
        姓名：<input id="name" placeholder="姓名"><br>
        <button onclick="addMember()">添加成员</button><br><br>

        成员姓名：<input id="fname" placeholder="输入姓名"><br>
        积分变化：<input id="score" placeholder="+5 -3"><br>
        原因：<input id="note" placeholder="备注"><br>
        <button onclick="doScore()">确认加减分</button>
    </div>

    <table>
        <tr><th>排名</th><th>部门</th><th>姓名</th><th>积分</th></tr>
        <tbody id="list"></tbody>
    </table>

    <div class="record">
        <h3>积分记录</h3>
        <div id="record"></div>
    </div>
</div>

<script>
    const PWD = "123456";
    const WARN = 60;

    function login(){
        let p = prompt("管理员密码：");
        if(p === PWD) document.getElementById("admin").style.display = "block";
        else alert("密码错误");
    }

    function load(){
        let m = localStorage.getItem("members");
        let r = localStorage.getItem("records");
        return {
            members: m ? JSON.parse(m) : [],
            records: r ? JSON.parse(r) : []
        }
    }

    function save(members, records){
        localStorage.setItem("members", JSON.stringify(members));
        localStorage.setItem("records", JSON.stringify(records));
    }

    function addMember(){
        let d = load();
        let dept = document.getElementById("dept").value;
        let name = document.getElementById("name").value;
        if(!dept||!name)return alert("请填写完整");
        d.members.push({dept,name,score:100});
        save(d.members, d.records);
        render();
        alert("添加成功");
        document.getElementById("dept").value="";
        document.getElementById("name").value="";
    }

    function doScore(){
        let d = load();
        let fname = document.getElementById("fname").value;
        let score = parseInt(document.getElementById("score").value);
        let note = document.getElementById("note").value;
        if(!fname||!score||!note)return alert("请填写完整");

        let user = d.members.find(u=>u.name==fname);
        if(!user) return alert("未找到成员");

        user.score += score;
        d.records.unshift({
            time:new Date().toLocaleString(),
            name:fname,
            score:score>0?"+"+score:score,
            note:note
        });
        save(d.members, d.records);
        render();
        alert("操作成功");
        document.getElementById("fname").value="";
        document.getElementById("score").value="";
        document.getElementById("note").value="";
    }

    function render(){
        let d = load();
        let sort = [...d.members].sort((a,b)=>b.score-a.score);
        let html = "";
        sort.forEach((u,i)=>{
            let c = u.score < WARN ? "low" : "";
            html+=`<tr class="${c}"><td>${i+1}</td><td>${u.dept}</td><td>${u.name}</td><td>${u.score}</td></tr>`;
        })
        document.getElementById("list").innerHTML = html;

        let rhtml = "";
        d.records.forEach(r=>{
            rhtml+=`<div class="item">${r.time} | ${r.name} ${r.score}分 | ${r.note}</div>`;
        })
        document.getElementById("record").innerHTML = rhtml;
    }

    render();
</script>
</body>
</html>
