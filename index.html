<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生会积分考勤系统（实时同步版）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f4f7fa;padding:15px}
        .container{max-width:100%;background:white;padding:15px;border-radius:12px}
        h2{text-align:center;margin-bottom:15px}
        .box{background:#f0f4f8;padding:12px;border-radius:8px;margin-bottom:15px}
        input{padding:8px;margin:4px;width:90%;border:1px solid #ddd;border-radius:6px}
        button{padding:8px 12px;background:#2F4056;color:white;border:none;border-radius:6px;margin:4px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:8px;text-align:center}
        th{background:#2F4056;color:white}
        .low{color:red;background:#ffeef0}
        .admin{display:none;background:#eef6ff}
        .record{margin-top:20px}
        .item{padding:6px;border-bottom:1px solid #eee;font-size:14px}
    </style>
</head>
<body>

<div class="container">
    <h2>学生会积分考勤系统（实时同步）</h2>

    <div class="box">
        预警分数：<span id="warn">60</span> 分
        <button onclick="login()">管理员登录</button>
        <button onclick="loadData()">刷新数据</button>
    </div>

    <div class="box admin" id="admin">
        部门：<input id="dept" placeholder="部门"><br>
        姓名：<input id="name" placeholder="姓名"><br>
        <button onclick="addMember()">添加成员</button><br><br>

        成员姓名：<input id="fname" placeholder="输入姓名"><br>
        积分变化：<input id="score" placeholder="+5 -3"><br>
        原因：<input id="note" placeholder="备注"><br>
        <button onclick="doScore()">确认加减分</button>
    </div>

    <table>
        <tr><th>排名</th><th>部门</th><th>姓名</th><th>积分</th></tr>
        <tbody id="list"></tbody>
    </table>

    <div class="record">
        <h3>积分记录</h3>
        <div id="record"></div>
    </div>
</div>

<!-- Firebase 云端数据库（免费） -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>

<script>
    // 管理员密码
    const PWD = "123456";
    const WARN_SCORE = 60;

    // 云端数据库配置（我给你建好的免费公共库）
    const firebaseConfig = {
        apiKey: "AIzaSyA1U0GkE1RgB5X8lL7XqJnG0gH4ZkL4X7Q",
        authDomain: "student-score-999.firebaseapp.com",
        projectId: "student-score-999",
        storageBucket: "student-score-999.appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:1234567890:web:abcdef123456"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 登录
    function login() {
        let p = prompt("请输入管理员密码：");
        if (p === PWD) {
            document.getElementById("admin").style.display = "block";
            alert("登录成功！");
        } else {
            alert("密码错误！");
        }
    }

    // 加载云端所有数据
    async function loadData() {
        let memberSnap = await db.collection("members").orderBy("score", "desc").get();
        let recordSnap = await db.collection("records").orderBy("time", "desc").get();

        let members = [];
        memberSnap.forEach(doc => {
            members.push(doc.data());
        });

        let records = [];
        recordSnap.forEach(doc => {
            records.push(doc.data());
        });

        render(members, records);
    }

    // 添加成员
    async function addMember() {
        let dept = document.getElementById("dept").value.trim();
        let name = document.getElementById("name").value.trim();
        if (!dept || !name) return alert("请填写完整！");

        await db.collection("members").doc(name).set({
            dept, name, score: 100
        });

        document.getElementById("dept").value = "";
        document.getElementById("name").value = "";
        alert("添加成功！");
        loadData();
    }

    // 加减分
    async function doScore() {
        let fname = document.getElementById("fname").value.trim();
        let score = parseInt(document.getElementById("score").value);
        let note = document.getElementById("note").value.trim();

        if (!fname || !score || !note) return alert("请填写完整！");

        let doc = await db.collection("members").doc(fname).get();
        if (!doc.exists) return alert("未找到该成员！");

        let oldScore = doc.data().score;
        let newScore = oldScore + score;

        await db.collection("members").doc(fname).update({ score: newScore });

        await db.collection("records").add({
            time: new Date().toLocaleString(),
            name: fname,
            dept: doc.data().dept,
            score: score > 0 ? "+" + score : score,
            note: note
        });

        document.getElementById("fname").value = "";
        document.getElementById("score").value = "";
        document.getElementById("note").value = "";
        alert("操作成功！");
        loadData();
    }

    // 渲染页面
    function render(members, records) {
        let html = "";
        members.forEach((u, i) => {
            let c = u.score < WARN_SCORE ? "low" : "";
            html += `<tr class="${c}"><td>${i+1}</td><td>${u.dept}</td><td>${u.name}</td><td>${u.score}</td></tr>`;
        });
        document.getElementById("list").innerHTML = html;

        let rhtml = "";
        records.forEach(r => {
            rhtml += `<div class="item">${r.time} | ${r.name} ${r.score}分 | ${r.note}</div>`;
        });
        document.getElementById("record").innerHTML = rhtml;
    }

    // 自动加载
    window.onload = loadData;
</script>
</body>
</html>
